version: "3.9"

# ---------------------------------------------------------------------------
# Architecture polyglotte :
#   - mongo1/2/3 : Replica Set MongoDB (rs0) -> tolère la panne d'1 nœud sur 3
#   - neo4j      : moteur de recommandation (graphe)
#   - redis      : sessions + top des ventes temps réel
#   - mongo-init : conteneur "jetable" qui initialise le replica set puis s'arrête
# ---------------------------------------------------------------------------

services:
  mongo1:
    image: mongo:7
    container_name: mongo1
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
    networks:
      - ecommerce-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongo2:
    image: mongo:7
    container_name: mongo2
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27018:27017"
    volumes:
      - mongo2_data:/data/db
    networks:
      - ecommerce-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongo3:
    image: mongo:7
    container_name: mongo3
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27019:27017"
    volumes:
      - mongo3_data:/data/db
    networks:
      - ecommerce-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-init:
    image: mongo:7
    container_name: mongo-init
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    networks:
      - ecommerce-net
    restart: "no"
    entrypoint: >
      bash -c "
        sleep 10 &&
        mongosh --host mongo1:27017 --eval '
          rs.initiate({
            _id: \"rs0\",
            members: [
              { _id: 0, host: \"mongo1:27017\", priority: 2 },
              { _id: 1, host: \"mongo2:27017\", priority: 1 },
              { _id: 2, host: \"mongo3:27017\", priority: 1 }
            ]
          })
        '
      "

  neo4j:
    image: neo4j:5
    container_name: neo4j
    ports:
      - "7474:7474"   # interface web Neo4j Browser
      - "7687:7687"   # protocole Bolt (utilisé par l'API)
    environment:
      - NEO4J_AUTH=neo4j/motdepasse_a_changer
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    networks:
      - ecommerce-net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-net
    command: ["redis-server", "--save", "60", "1"]

networks:
  ecommerce-net:
    driver: bridge

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data:
  neo4j_data:
  redis_data:
